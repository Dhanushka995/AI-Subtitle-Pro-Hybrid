name: Build AI Subtitle Pro
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Libraries
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller google-generativeai openai requests deep-translator

    - name: Create EXE File
      run: |
        python -m PyInstaller --onefile --noconsole --name "AI_Subtitle_Pro" app.py

    - name: Upload Software
      uses: actions/upload-artifact@v4
      with:
        name: AI_Subtitle_Pro_Software
        path: dist/AI_Subtitle_Pro.exe
